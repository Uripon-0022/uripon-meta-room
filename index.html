<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>うりぽん号メタ部屋</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #241e30; color: #f4ead2;
    font-family: "Hiragino Maru Gothic ProN", "BIZ UDGothic", sans-serif;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 8px;
    touch-action: manipulation;
  }
  header { text-align: center; margin: 2px 0 8px; }
  h1 { font-size: 18px; letter-spacing: 2px; }
  #online { font-size: 12px; opacity: .8; }
  #main { display: flex; gap: 8px; width: min(1360px, 98vw); align-items: stretch; }
  #stageWrap { flex: 1; min-width: 0; }
  #stage {
    position: relative; width: 100%;
    aspect-ratio: 640 / 440;
    border: 4px solid #120d1c; border-radius: 6px;
    overflow: hidden; background: #120d1c;
  }
  canvas.game { position: absolute; inset: 0; width: 100%; height: 100%; image-rendering: pixelated; cursor: pointer; }
  #sharePane {
    position: absolute; top: 8px; right: 8px; width: 46%;
    background: #17121f; border: 2px solid #e8b45a; border-radius: 8px;
    display: none; z-index: 5; overflow: hidden;
  }
  #shareHead { display: flex; justify-content: space-between; align-items: center;
    padding: 4px 8px; font-size: 12px; background: #2c2340; }
  #shareClose { background: none; border: none; color: #fff; cursor: pointer; font-size: 14px; padding: 0 4px; }
  #shareVideo { width: 100%; display: block; background: #000; }
  #chatPanel { width: 270px; display: flex; flex-direction: column; overflow: hidden;
    background: #1c1628; border: 3px solid #120d1c; border-radius: 6px; }
  #main { align-items: flex-start; }
  #chatHead { padding: 8px 10px; font-size: 13px; font-weight: bold; background: #2c2340; border-radius: 3px 3px 0 0; }
  #log { flex: 1; overflow-y: auto; padding: 8px 10px; font-size: 12px; line-height: 1.7; min-height: 0; }
  #log .n { color: #e8b45a; font-weight: bold; }
  #log .t { color: #eee; }
  #log .tm { color: #8a80a0; font-size: 10px; margin-right: 5px; }
  #chatForm { display: flex; gap: 4px; padding: 6px; border-top: 2px solid #120d1c; }
  #chatInput { flex: 1; min-width: 0; padding: 8px; font-size: 13px; color: #222; border-radius: 6px; border: none; }
  #bar { width: min(1360px, 98vw); margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  button { font-family: inherit; font-size: 14px; border-radius: 6px; border: 2px solid #120d1c;
    padding: 8px 14px; background: #4a3f63; color: #fff; cursor: pointer; }
  button.active { background: #e8b45a; color: #17121f; font-weight: bold; }
  #goHomeBtn { background: #8a4a5a; }
  #discordBtn { background: #5865F2; }
  #shareBtn.sharing { background: #d84848; }
  #decoBtn.active { background: #e07ab0; color: #fff; }
  #decoBar { width: min(1360px, 98vw); margin-top: 6px; display: none; gap: 6px; flex-wrap: wrap; align-items: center;
    background: #1c1628; padding: 8px; border-radius: 6px; border: 2px solid #e07ab0; }
  #decoBar .dc { font-size: 13px; padding: 6px 10px; }
  #decoBar .dc.sel { background: #e07ab0; color: #fff; font-weight: bold; }
  #decoBar .hint { font-size: 11px; opacity: .7; width: 100%; }
  footer { margin-top: 8px; font-size: 11px; opacity: .55; text-align: center; line-height: 1.6; }
  @media (max-width: 760px) {
    #main { flex-direction: column; }
    #chatPanel { width: 100%; height: 190px; }
    #sharePane { width: 70%; }
  }
  #login { position: fixed; inset: 0; background: rgba(18,13,28,.94);
    display: flex; align-items: center; justify-content: center; z-index: 20; overflow-y: auto; }
  #loginBox { background: #2c2340; border: 3px solid #e8b45a; border-radius: 12px;
    padding: 20px; width: min(440px, 94vw); text-align: center; margin: auto; }
  #loginBox h2 { font-size: 16px; margin-bottom: 12px; }
  #nameInput { width: 100%; padding: 10px; font-size: 16px; color: #222; margin-bottom: 10px; border-radius: 6px; border: none; }
  #preview { image-rendering: pixelated; width: 144px; height: 168px; background: #4a3f63; border-radius: 8px; margin-bottom: 8px; }
  .optRow { display: flex; gap: 5px; justify-content: center; margin: 6px 0; flex-wrap: wrap; align-items: center; }
  .optRow .lbl { font-size: 12px; opacity: .8; width: 100%; text-align: left; }
  .sw { width: 26px; height: 26px; border-radius: 6px; border: 3px solid transparent; cursor: pointer; }
  .sw.sel { border-color: #fff; }
  .hs { min-width: 44px; height: 30px; border-radius: 6px; border: 3px solid transparent; cursor: pointer;
    background: #4a3f63; color: #fff; font-size: 11px; padding: 0 4px; }
  .hs.sel { border-color: #fff; }
  #enterBtn { width: 100%; padding: 12px; font-size: 16px; background: #e8b45a; color: #17121f; font-weight: bold; margin-top: 10px; }
  #err { color: #ff9c9c; font-size: 12px; margin-top: 8px; min-height: 1em; }
</style>
</head>
<body>
<header>
  <h1>🚢 うりぽん号メタ部屋</h1>
  <div id="online">はじめに「入室する」を押してね</div>
</header>

<div id="main">
  <div id="stageWrap"><div id="stage">
    <canvas id="cv" class="game" width="2560" height="1760"></canvas>
    <div id="sharePane">
      <div id="shareHead"><span id="shareTitle">画面共有</span><button id="shareClose">✕</button></div>
      <video id="shareVideo" autoplay playsinline muted></video>
    </div>
  </div></div>
  <div id="chatPanel">
    <div id="chatHead">💬 チャット</div>
    <div id="log"></div>
    <div id="chatForm">
      <input id="chatInput" type="text" maxlength="200" placeholder="メッセージ…">
      <button id="sendBtn">送信</button>
    </div>
  </div>
</div>

<div id="bar">
  <button id="stWork">▶ 作業開始</button>
  <button id="stBreak">☕ 休憩中</button>
  <button id="goHomeBtn">🏠 帰宅</button>
  <button id="danceBtn">💃 ダンス</button>
  <button id="ssjBtn">⚡ 覚醒</button>
  <button id="shareBtn">🖥 画面共有</button>
  <button id="decoBtn">🎨 デコ・模様替え</button>
  <button id="discordBtn">🎧 ボイス(Discord)</button>
  <button id="dressBtn">👗 着替える</button>
</div>
<div id="decoBar">
  <span class="hint">🎨 模様替えモード: <b>家具やデコをつまんでドラッグで移動</b>。アイテムを選んで床クリックで設置、「🗑削除」でデコを片付け（配置はみんなに同期・保存されます）</span>
  <span id="decoItems" style="display:flex;gap:6px;flex-wrap:wrap;"></span>
  <button id="decoDelBtn" class="dc">🗑 削除</button>
  <button id="decoResetBtn" class="dc">↺ 家具を初期配置に</button>
  <button id="decoDone" class="dc">✅ おわり</button>
</div>

<footer>移動: 十字キー / WASD / クリック（タップ）。<b>Shift か B でダッシュ</b>、キーをポンと押すと向きだけ変わるよ。おしゃべりはDiscordのボイスチャンネルと併用してね。</footer>

<div id="login">
  <div id="loginBox">
    <h2>🚢 うりぽん号メタ部屋へようこそ</h2>
    <canvas id="preview" width="72" height="84"></canvas>
    <input id="nameInput" type="text" maxlength="16" placeholder="なまえ（ニックネーム）">
    <div class="optRow"><span class="lbl">かみがた</span><span id="hairStyles" class="optRow"></span></div>
    <div class="optRow"><span class="lbl">かみの色</span><span id="hairColors" class="optRow"></span></div>
    <div class="optRow"><span class="lbl">あたま（かぶりもの）</span><span id="accs" class="optRow"></span></div>
    <div class="optRow"><span class="lbl">トップス</span><span id="shirtColors" class="optRow"></span></div>
    <div class="optRow"><span class="lbl">ボトムス</span><span id="pantsColors" class="optRow"></span></div>
    <button id="enterBtn">入室する</button>
    <div id="err"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
'use strict';
// ================= 基本設定 =================
const S = 4, W = 640, H = 440;
const SPEED = 62, DASH = 1.9;
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;

const HAIR_STYLES = ['ボブ', 'ロング', 'ツン', 'おだんご'];
const HAIR_COLORS  = ['#4a2c14', '#1e1a22', '#8a5a2a', '#b8862e', '#8a4a5a', '#5a6a8a',
  '#f070b0', '#e04848', '#4890e8', '#48c078', '#9868e0', '#40c8c8', '#e8e8f0', '#f0c040'];
const ACCS = ['なし', '🐱ねこ耳', '🐰うさ耳', '🐻くま耳', '👒麦わら', '🧢キャップ', '🐸着ぐるみ'];
const SHIRT_COLORS = ['#f2d049', '#e0607a', '#4f86dc', '#4cc27e', '#bc62dc', '#e0703c', '#3cc0c0', '#f0f0ee'];
const PANTS_COLORS = ['#f6f4f0', '#3c3c46', '#5a3c2a', '#37548a', '#7a3c50', '#4a604a'];
const O = '#241a10';

// ================= ピクセル描画ヘルパー =================
let g;
function px(x, y, w, h, c) { g.fillStyle = c; g.fillRect(x, y, w, h); }
function outlineRect(x, y, w, h, c) { px(x - 1, y - 1, w + 2, h + 2, O); px(x, y, w, h, c); }
function shade(hex, amt) {
  const cl = v => Math.max(0, Math.min(255, v));
  const n = parseInt(hex.slice(1), 16);
  return `rgb(${cl((n >> 16) + amt)},${cl(((n >> 8) & 255) + amt)},${cl((n & 255) + amt)})`;
}

// ================= 家具パーツの描画 =================
function fPiano(x, y) {
  outlineRect(x, y, 30, 16, '#1e1a22'); px(x + 1, y + 1, 28, 5, '#38323e'); px(x + 2, y + 11, 24, 3, '#f0f0f0');
  for (let i = 0; i < 8; i++) px(x + 4 + i * 3, y + 11, 1, 3, '#222');
}
function fBar(x, y) {
  outlineRect(x, y, 110, 14, '#6e4a28'); px(x, y, 110, 4, '#8a5f38'); px(x, y + 12, 110, 2, '#5a3a1e');
  for (let i = 0; i < 4; i++) { px(x + 8 + i * 10, y - 4, 4, 6, '#d8b830'); px(x + 9 + i * 10, y - 6, 2, 3, '#888'); }
  for (let i = 0; i < 5; i++) px(x + 56 + i * 8, y + 2, 4, 5, '#f0e8c8');
  outlineRect(x + 92, y - 6, 14, 12, '#3a3a42'); px(x + 94, y - 4, 10, 5, '#e8e0d0');
  for (let i = 0; i < 5; i++) outlineRect(x + 8 + i * 18, y + 20, 8, 6, '#c04848');
}
function fCafeTable(x, y, c) {
  g.fillStyle = c; g.beginPath(); g.ellipse(x + 6, y + 5, 15, 9, 0, 0, 7); g.fill();
  g.fillStyle = 'rgba(0,0,0,.12)'; g.beginPath(); g.ellipse(x + 6, y + 7, 15, 7, 0, 0, 7); g.fill();
  outlineRect(x, y, 12, 9, '#e8e0d0'); px(x, y, 12, 3, '#f4eee0');
  px(x - 8, y + 2, 5, 5, '#f0f0f0'); px(x + 15, y + 2, 5, 5, '#f0f0f0');
}
function fBooth(x, y) {
  g.fillStyle = 'rgba(0,0,0,.08)'; g.fillRect(x - 2, y + 22, 26, 5);
  outlineRect(x, y, 22, 7, '#68a848'); px(x + 1, y + 1, 20, 2, '#80c060');
  outlineRect(x, y + 19, 22, 7, '#68a848'); px(x + 1, y + 20, 20, 2, '#80c060');
  outlineRect(x + 3, y + 9, 16, 8, '#e8e0d0'); px(x + 3, y + 9, 16, 3, '#f4eee0');
}
function fPodDesk(x, y) {
  outlineRect(x, y, 40, 12, '#1a1a20');
  px(x + 2, y + 2, 16, 8, '#2a6a9a'); px(x + 20, y + 2, 16, 8, '#2a6a9a');
  px(x + 3, y + 3, 8, 2, '#8adcf8'); px(x + 21, y + 3, 8, 2, '#8adcf8');
  fGamingChair(x + 4, y + 24); fGamingChair(x + 24, y + 24);
}
function fGamingChair(x, y) {
  outlineRect(x, y, 12, 6, '#2a2a32'); px(x + 1, y + 1, 10, 2, '#c04858');
  outlineRect(x + 2, y - 6, 8, 6, '#2a2a32'); px(x + 3, y - 5, 6, 3, '#c04858');
}
function fPalm(x, y) {
  px(x + 2, y - 2, 4, 16, '#8a6a3a'); px(x + 3, y - 2, 1, 16, '#a8854a');
  g.fillStyle = '#3a9a4a';
  for (const [dx, dy] of [[-6, -6], [6, -6], [-8, 0], [8, 0], [0, -10]]) {
    g.beginPath(); g.ellipse(x + 4 + dx, y + dy, 8, 3.5, dx * .06, 0, 7); g.fill();
  }
}
function fTv(x, y) { outlineRect(x, y, 30, 14, '#3a3a42'); px(x + 2, y + 2, 26, 10, '#4a90c8'); px(x + 4, y + 4, 10, 2, '#a8dcf0'); }
function fShelf(x, y) {
  outlineRect(x, y, 24, 18, '#8a5f38'); px(x, y, 24, 2, '#a8783e');
  for (let r = 0; r < 2; r++) for (let i = 0; i < 6; i++)
    px(x + 2 + i * 3.5, y + 3 + r * 8, 2.5, 6, ['#c05858', '#5878c0', '#58a058', '#c0a040', '#9058b0'][(i + r) % 5]);
}
function fBoard(x, y) {
  outlineRect(x, y, 34, 14, '#a87848'); px(x + 2, y + 2, 30, 10, '#e8d8b0');
  px(x + 5, y + 4, 9, 3, '#e88a8a'); px(x + 17, y + 5, 9, 3, '#8ab2e0'); px(x + 8, y + 9, 10, 3, '#a8d890');
}
function fPlant(x, y) {
  outlineRect(x, y + 5, 10, 7, '#a86a3a'); px(x + 1, y + 6, 8, 2, '#c08048');
  g.fillStyle = '#4a9a4a'; g.beginPath(); g.arc(x + 5, y + 1, 7, 0, 7); g.fill();
  g.fillStyle = '#5ab45a'; g.beginPath(); g.arc(x + 3, y - 1, 4, 0, 7); g.fill();
}
function fSofaSet(x, y, c) {
  g.fillStyle = 'rgba(0,0,0,.08)'; g.beginPath(); g.ellipse(x + 24, y + 16, 40, 17, 0, 0, 7); g.fill();
  outlineRect(x, y, 48, 9, c); px(x, y, 48, 3, shade(c, 30));
  outlineRect(x, y + 24, 48, 9, c); px(x, y + 24, 48, 3, shade(c, 30));
  outlineRect(x + 14, y + 12, 20, 9, '#e8e0d0'); px(x + 14, y + 12, 20, 3, '#f4eee0');
  px(x + 18, y + 14, 5, 4, '#c8e8f0'); px(x + 26, y + 14, 5, 4, '#f0d0a0');
}
function fThSofaV(x, y) { outlineRect(x, y, 12, 50, '#c04848'); px(x + 1, y + 1, 10, 48, '#d86060'); px(x + 1, y + 1, 4, 48, '#e87878'); }
function fThSofaH(x, y) { outlineRect(x, y, 72, 12, '#c04848'); px(x + 1, y + 1, 70, 10, '#d86060'); px(x + 1, y + 1, 70, 4, '#e87878'); }
function fThRug(x, y) {
  g.fillStyle = '#4868b0'; g.beginPath(); g.ellipse(x + 34, y + 15, 34, 15, 0, 0, 7); g.fill();
  g.fillStyle = '#6888c8'; g.beginPath(); g.ellipse(x + 34, y + 15, 22, 9, 0, 0, 7); g.fill();
}
function fThTable(x, y) {
  outlineRect(x, y, 20, 10, '#e8e0d0'); px(x, y, 20, 4, '#f4eee0');
  px(x + 4, y + 2, 5, 4, '#f0d0a0'); px(x + 12, y + 2, 5, 4, '#c8e8f0');
}
function fPopcorn(x, y) {
  outlineRect(x, y, 14, 20, '#d84848'); px(x + 2, y + 2, 10, 8, '#f8f0d8'); px(x + 4, y + 4, 6, 4, '#f0d048');
  px(x + 2, y + 12, 10, 2, '#f0f0f0');
}
function fTansu(x, y) {
  outlineRect(x, y, 36, 18, '#8a5f38'); px(x + 2, y + 2, 32, 6, '#a8783e'); px(x + 2, y + 10, 32, 6, '#a8783e');
  px(x + 14, y + 4, 5, 1, '#e8c060'); px(x + 14, y + 12, 5, 1, '#e8c060');
}
function fRedTable(x, y) {
  outlineRect(x, y, 48, 32, '#b04040'); px(x + 2, y + 2, 44, 28, '#c85050'); px(x + 4, y + 4, 40, 4, '#d86868');
  px(x + 14, y + 10, 18, 12, '#e8dcb8'); px(x + 18, y + 13, 5, 4, '#c8e8f0'); px(x + 26, y + 13, 5, 4, '#f0a030');
  fCushion(x - 20, y + 10); fCushion(x + 54, y + 10); fCushion(x + 16, y - 14); fCushion(x + 16, y + 38);
}
function fHearth(x, y) {
  outlineRect(x, y, 36, 28, '#c04858'); px(x + 2, y + 2, 32, 24, '#d86878');
  outlineRect(x + 6, y + 6, 24, 14, '#e8dcb8'); px(x + 8, y + 8, 20, 3, '#f4ecd0');
  px(x + 12, y + 11, 7, 6, '#f0a030'); px(x + 14, y + 10, 2, 2, '#4a7a3a'); px(x + 22, y + 12, 5, 4, '#c8e8f0');
  fCushion(x - 18, y + 8); fCushion(x + 42, y + 8);
}
function fCushion(x, y) { outlineRect(x, y, 12, 9, '#9060a8'); px(x + 1, y + 1, 10, 3, '#a878c0'); }
// デスク島（2列×3席＝6席・小物つき）
function fIsland(x, y, c) {
  g.fillStyle = 'rgba(0,0,0,.08)'; g.fillRect(x - 2, y + 40, 98, 5);
  outlineRect(x, y, 94, 40, c);
  px(x, y, 94, 3, shade(c, 25)); px(x, y + 38, 94, 2, shade(c, -35));
  px(x, y + 19, 94, 2, shade(c, -35));
  for (let i = 1; i < 3; i++) { px(x + i * 31, y, 1, 19, shade(c, -25)); px(x + i * 31, y + 21, 1, 19, shade(c, -25)); }
  const clutter = ['mug', 'plant', 'cake', 'books'];
  for (let row = 0; row < 2; row++) {
    const ry = y + 2 + row * 21;
    for (let i = 0; i < 3; i++) {
      const dx = x + 2 + i * 31;
      outlineRect(dx + 2, ry + 1, 12, 8, '#2a2a32'); px(dx + 3, ry + 2, 10, 5, '#9adcf0'); px(dx + 3, ry + 2, 10, 2, '#c8ecf8');
      px(dx + 16, ry + 6, 8, 4, '#e8e8e8'); px(dx + 17, ry + 7, 6, 2, '#d0d0d0');
      const cl = clutter[(i + row * 2) % 4];
      if (cl === 'mug') { px(dx + 25, ry + 2, 4, 5, '#f0f0f0'); px(dx + 26, ry + 3, 2, 2, '#8a5a2a'); }
      else if (cl === 'plant') { px(dx + 25, ry + 4, 4, 4, '#a86a3a'); px(dx + 25, ry + 1, 4, 3, '#58a858'); }
      else if (cl === 'cake') { px(dx + 25, ry + 3, 5, 4, '#f0c0d0'); px(dx + 25, ry + 2, 5, 1, '#f8f0f0'); px(dx + 27, ry + 1, 1, 1, '#e04848'); }
      else { px(dx + 25, ry + 5, 5, 2, '#c05858'); px(dx + 25, ry + 3, 5, 2, '#5878c0'); px(dx + 25, ry + 1, 5, 2, '#58a058'); }
    }
  }
  for (let i = 0; i < 3; i++) { fChair(x + 10 + i * 31, y - 9); fChair(x + 10 + i * 31, y + 44); }
}
function fChair(x, y) { outlineRect(x, y, 10, 7, '#3a3a44'); px(x + 1, y + 1, 8, 3, '#5a5a68'); }
function fVending(x, y) {
  outlineRect(x, y, 16, 26, '#d84848'); px(x + 2, y + 2, 12, 12, '#f0f0f0');
  for (let i = 0; i < 3; i++) px(x + 3 + i * 4, y + 4, 3, 4, ['#e8a030', '#4a90c8', '#8ac88a'][i]);
  px(x + 2, y + 17, 8, 5, '#333');
}
function fCatTower(x, y) {
  px(x + 6, y + 10, 3, 14, '#c8b090'); outlineRect(x + 2, y + 4, 12, 6, '#a89070');
  outlineRect(x + 4, y - 4, 8, 5, '#a89070');
  px(x + 5, y - 7, 6, 4, '#e8a860'); px(x + 5, y - 9, 2, 2, '#e8a860'); px(x + 9, y - 9, 2, 2, '#e8a860');
  px(x + 6, y - 6, 1, 1, '#222'); px(x + 9, y - 6, 1, 1, '#222');
}
function fWboard(x, y) {
  outlineRect(x, y, 48, 12, '#e8e8e8'); px(x + 2, y + 2, 44, 8, '#f8f8f8');
  px(x + 5, y + 4, 16, 2, '#8ab2e0'); px(x + 5, y + 8, 24, 1, '#c0c8d8');
}
function fMtable(x, y) {
  outlineRect(x, y, 64, 26, '#e8e4dc'); px(x + 2, y + 2, 60, 6, '#f8f4ec');

let OBST = [];
function rebuildObstacles() {
  OBST = [[8, 392, 66, 20], [102, 392, 98, 20]];   // 川（橋x76〜100は通れる）
  for (const f of FURN_DEFAULT) {
    const t = FURN_TYPES[f.t];
    if (!t.bw) continue;
    const p = furnPos(f);
    OBST.push([p.x, p.y, t.bw, t.bh]);
  }
}
function blockedAt(x, y) {
  for (const r of OBST) if (x > r[0] && x < r[0] + r[2] && y > r[1] && y < r[1] + r[3]) return true;
  return false;
}
function tryMove(p, nx, ny) {
  if (blockedAt(p.x, p.y)) { p.x = nx; p.y = ny; return true; }  // 家具の下敷きになったら脱出可能
  if (!blockedAt(nx, ny)) { p.x = nx; p.y = ny; return true; }
  if (!blockedAt(nx, p.y)) { p.x = nx; return true; }
  if (!blockedAt(p.x, ny)) { p.y = ny; return true; }
  return false;
}

  } else if (hs === 3 && ac === 0) {
    px(X - 4, B - 59, 8, 8, O); px(X - 3, B - 58, 6, 6, hc);
    px(X - 1, B - 61, 2, 3, '#e05a80');
  }
  if (ac === 1) {
    catEar(X - 8, B - 51, -1, hc); catEar(X + 8, B - 51, 1, hc);
  } else if (ac === 2) {
    px(X - 7, B - 66, 5, 16, O); px(X + 2, B - 66, 5, 16, O);
    px(X - 6, B - 65, 3, 14, '#f4f0ea'); px(X + 3, B - 65, 3, 14, '#f4f0ea');
    px(X - 5, B - 62, 1, 10, '#f0b8c0'); px(X + 4, B - 62, 1, 10, '#f0b8c0');
  } else if (ac === 3) {
    fcirc(X - 8, B - 53, 5, O); fcirc(X + 8, B - 53, 5, O);
    fcirc(X - 8, B - 53, 3, '#9a6a3a'); fcirc(X + 8, B - 53, 3, '#9a6a3a');
    fcirc(X - 8, B - 53, 2, '#c89a60'); fcirc(X + 8, B - 53, 2, '#c89a60');
  } else if (ac === 4) {
    px(X - 14, B - 53, 28, 5, O); px(X - 13, B - 52, 26, 3, '#e8cc70');
    px(X - 9, B - 60, 18, 9, O); px(X - 8, B - 59, 16, 7, '#e8cc70');
    px(X - 8, B - 54, 16, 2, '#d05858');
  } else if (ac === 5) {
    px(X - 10, B - 57, 20, 7, O); px(X - 9, B - 56, 18, 5, '#4878c8');
    if (dir !== 'up') { px(X - 11 + s * 6, B - 51, 12 + Math.abs(s) * 4, 3, O); px(X - 10 + s * 6, B - 50, 10 + Math.abs(s) * 4, 2, '#3868b8'); }
  } else if (ac === 6) {
    px(X - 11, B - 54, 22, 10, O); px(X - 10, B - 53, 20, 8, '#78c060');
    px(X - 11, B - 46, 4, 12, O); px(X + 7, B - 46, 4, 12, O);
    px(X - 10, B - 45, 2, 10, '#78c060'); px(X + 8, B - 45, 2, 10, '#78c060');
    fcirc(X - 5, B - 55, 4, O); fcirc(X + 5, B - 55, 4, O);
    fcirc(X - 5, B - 55, 3, '#f0f0e8'); fcirc(X + 5, B - 55, 3, '#f0f0e8');
    px(X - 6, B - 56, 2, 2, '#222'); px(X + 4, B - 56, 2, 2, '#222');
  }
  if (ssj && frame % 2) {
    px(X - 14, B - 40, 2, 6, '#fff8a0'); px(X + 12, B - 46, 2, 6, '#fff8a0');
    px(X - 12, B - 56, 2, 4, '#fff8a0'); px(X + 10, B - 30, 2, 4, '#fff8a0');
  }
  c2.restore();
  function catEar(x, y, sgn, col) {
    g.fillStyle = O; g.beginPath(); g.moveTo(x - 4 * sgn, y); g.lineTo(x + 3 * sgn, y); g.lineTo(x, y - 8); g.closePath(); g.fill();
    g.fillStyle = col; g.beginPath(); g.moveTo(x - 2.5 * sgn, y - 1); g.lineTo(x + 1.5 * sgn, y - 1); g.lineTo(x, y - 6.5); g.closePath(); g.fill();
    g.fillStyle = '#f0a8b0'; g.beginPath(); g.moveTo(x - 1.2 * sgn, y - 2); g.lineTo(x + .6 * sgn, y - 2); g.lineTo(x, y - 4.6); g.closePath(); g.fill();
  }
  function fcirc(x, y, r, c) { g.fillStyle = c; g.beginPath(); g.arc(x, y, r, 0, 7); g.fill(); }
}

// ================= Firebase =================
function connect() {
  if (!fbReady) { firebase.initializeApp(window.FIREBASE_CONFIG); db = firebase.database(); fbReady = true; }
  myRef = db.ref('rooms/main/players/' + me.id);
  const push = () => myRef.set({ name: me.name, hs: me.hs, hc: me.hc, sc: me.sc, pc: me.pc, ac: me.ac,
    st: me.st, d: me.dir, em: me.em || '', emu: me.emu || 0,
    x: Math.round(me.x), y: Math.round(me.y), tx: Math.round(me.tx), ty: Math.round(me.ty),
    ts: firebase.database.ServerValue.TIMESTAMP });
  myRef.onDisconnect().remove();
  push(); me.push = push;

  if (connect.subscribed) return;
  connect.subscribed = true;
  db.ref('rooms/main/players').on('value', snap => {
    const data = snap.val() || {};
    for (const id of Object.keys(others)) if (!data[id]) delete others[id];
    let n = 0;
    for (const [id, p] of Object.entries(data)) {
      n++;
      if (me && id === me.id) continue;
      if (!others[id]) others[id] = { id, x: p.x, y: p.y };
      Object.assign(others[id], { name: p.name, hs: p.hs || 0, hc: p.hc || 0, sc: p.sc || 0, pc: p.pc || 0,
        ac: p.ac || 0, st: p.st || 'work', dir: p.d || 'down', em: p.em || '', emu: p.emu || 0, tx: p.tx, ty: p.ty });
      if (Math.hypot(others[id].x - p.x, others[id].y - p.y) > 80) { others[id].x = p.x; others[id].y = p.y; }
    }
    document.getElementById('online').textContent = me ? `🟢 いま ${n} 人がオンライン` : `部屋には ${n} 人います`;
  });
  db.ref('rooms/main/chat').limitToLast(40).on('child_added', snap => {
    const m = snap.val(); if (!m) return;
    addLog(m.n, m.t, m.ts);
    if (Date.now() - (m.ts || 0) < 15000 && m.pid) bubbles[m.pid] = { text: m.t, until: Date.now() + 7000 };
  });
  db.ref('rooms/main/deco').on('child_added', snap => { decos[snap.key] = snap.val(); });
  db.ref('rooms/main/deco').on('child_removed', snap => { delete decos[snap.key]; });
  db.ref('rooms/main/layout').on('value', snap => {
    layout = snap.val() || {};
    rebuildObstacles(); buildRoom();
  });
  watchScreen();
}
function addLog(n, t, ts) {
  const log = document.getElementById('log');
  const div = document.createElement('div');
  const d = new Date(ts || Date.now());
  const tm = document.createElement('span'); tm.className = 'tm';
  tm.textContent = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
  const nm = document.createElement('span'); nm.className = 'n'; nm.textContent = n + '：';
  const tx = document.createElement('span'); tx.className = 't'; tx.textContent = t;
  div.appendChild(tm); div.appendChild(nm); div.appendChild(tx);
  log.appendChild(div); log.scrollTop = log.scrollHeight;
  while (log.children.length > 80) log.removeChild(log.firstChild);
}

// ================= 画面共有（WebRTC・P2P） =================
const RTC_CONF = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
let shareStream = null;
const senderPeers = {};
let viewerPc = null;
let currentShareOwner = null;

async function startShare() {
  if (!me || !db) return;
  try {
    shareStream = await navigator.mediaDevices.getDisplayMedia({ video: { frameRate: 12 }, audio: false });
  } catch (e) { return; }
  const sRef = db.ref('rooms/main/screen');
  await db.ref('rooms/main/rtc').remove();
  sRef.set({ owner: me.id, name: me.name, ts: firebase.database.ServerValue.TIMESTAMP });
  sRef.onDisconnect().remove();
  db.ref('rooms/main/rtc').on('child_added', onViewerJoin);
  shareStream.getVideoTracks()[0].onended = stopShare;
  document.getElementById('shareBtn').classList.add('sharing');
  document.getElementById('shareBtn').textContent = '⏹ 共有を停止';
  notifyDiscord(`🖥 ${me.name}さんがメタ部屋で画面共有を始めました`);
}
function onViewerJoin(snap) {
  const vid = snap.key;
  if (!shareStream || senderPeers[vid]) return;
  const ref = snap.ref;
  const pc = new RTCPeerConnection(RTC_CONF);
  senderPeers[vid] = pc;
  shareStream.getTracks().forEach(t => pc.addTrack(t, shareStream));
  pc.onicecandidate = e => { if (e.candidate) ref.child('sc').push(JSON.stringify(e.candidate)); };
  const handleOffer = async (offJson) => {
    if (!offJson || pc.currentRemoteDescription) return;
    await pc.setRemoteDescription(JSON.parse(offJson));
    const ans = await pc.createAnswer();
    await pc.setLocalDescription(ans);
    ref.child('answer').set(JSON.stringify(pc.localDescription));
  };
  ref.child('offer').on('value', sv => handleOffer(sv.val()));
  ref.child('vc').on('child_added', sv => { try { pc.addIceCandidate(JSON.parse(sv.val())); } catch (e) {} });
}
function stopShare() {
  if (shareStream) { shareStream.getTracks().forEach(t => t.stop()); shareStream = null; }
  for (const pc of Object.values(senderPeers)) pc.close();
  for (const k of Object.keys(senderPeers)) delete senderPeers[k];
  if (db) { db.ref('rooms/main/rtc').off('child_added', onViewerJoin); db.ref('rooms/main/screen').remove(); db.ref('rooms/main/rtc').remove(); }
  document.getElementById('shareBtn').classList.remove('sharing');
  document.getElementById('shareBtn').textContent = '🖥 画面共有';
}
function watchScreen() {
  db.ref('rooms/main/screen').on('value', snap => {
    const sc = snap.val();
    const pane = document.getElementById('sharePane');
    if (sc && me && sc.owner !== me.id) {
      if (currentShareOwner !== sc.owner) { teardownViewer(); currentShareOwner = sc.owner; startViewing(sc); }
      document.getElementById('shareTitle').textContent = `🖥 ${sc.name}さんの画面`;
      pane.style.display = 'block';
    } else if (!sc) {
      teardownViewer(); currentShareOwner = null; pane.style.display = 'none';
    }
  });
}
async function startViewing(sc) {
  const ref = db.ref('rooms/main/rtc/' + me.id);
  await ref.remove();
  viewerPc = new RTCPeerConnection(RTC_CONF);
  viewerPc.addTransceiver('video', { direction: 'recvonly' });
  viewerPc.ontrack = e => { document.getElementById('shareVideo').srcObject = e.streams[0]; };
  viewerPc.onicecandidate = e => { if (e.candidate) ref.child('vc').push(JSON.stringify(e.candidate)); };
  ref.child('answer').on('value', sv => {
    if (sv.val() && viewerPc && !viewerPc.currentRemoteDescription) viewerPc.setRemoteDescription(JSON.parse(sv.val())).catch(() => {});
  });
  ref.child('sc').on('child_added', sv => { try { viewerPc.addIceCandidate(JSON.parse(sv.val())); } catch (e) {} });
  const off = await viewerPc.createOffer();
  await viewerPc.setLocalDescription(off);
  ref.child('offer').set(JSON.stringify(viewerPc.localDescription));
  ref.onDisconnect().remove();
}
function teardownViewer() {
  if (viewerPc) { viewerPc.close(); viewerPc = null; }
  if (db && me) db.ref('rooms/main/rtc/' + me.id).remove();
  document.getElementById('shareVideo').srcObject = null;
}
document.getElementById('shareBtn').addEventListener('click', () => { shareStream ? stopShare() : startShare(); });

// ================= 入力（クリック・十字キー・ダッシュ・デコ&家具ドラッグ） =================
let drag = null;   // {kind:'deco',key,moved} | {kind:'furn',id,offx,offy}
function evPos(e) {
  const r = cv.getBoundingClientRect();
  return { lx: (e.clientX - r.left) / r.width * W, ly: (e.clientY - r.top) / r.height * H };
}
cv.addEventListener('pointerdown', e => {
  if (!me) return;
  const { lx, ly } = evPos(e);
  if (decoMode && db) {
    cv.setPointerCapture(e.pointerId);
    // 削除モード: デコのみ削除
    if (decoDel) {
      let bestK = null, bestD = 14;
      for (const [k, d] of Object.entries(decos)) {
        const dd = Math.hypot(d.x - lx, d.y - ly);
        if (dd < bestD) { bestD = dd; bestK = k; }
      }
      if (bestK) db.ref('rooms/main/deco/' + bestK).remove();
      return;
    }
    // 1) デコをつまむ
    let bestK = null, bestD = 12;
    for (const [k, d] of Object.entries(decos)) {
      const dd = Math.hypot(d.x - lx, d.y - ly);
      if (dd < bestD) { bestD = dd; bestK = k; }
    }
    if (bestK) { drag = { kind: 'deco', key: bestK, moved: false }; return; }
    // 2) 家具をつまむ（手前=リスト後方から判定）
    for (let i = FURN_DEFAULT.length - 1; i >= 0; i--) {
      const f = FURN_DEFAULT[i], t = FURN_TYPES[f.t], p = furnPos(f);
      const w = t.bw || t.hw || 16, h = t.bh || t.hh || 12;
      if (lx > p.x - 5 && lx < p.x + w + 5 && ly > p.y - 5 && ly < p.y + h + 5) {
        drag = { kind: 'furn', id: f.id, offx: lx - p.x, offy: ly - p.y };
        dragFurnId = f.id; buildRoom();
        return;
      }
    }
    // 3) 何もない床 → デコ設置
    db.ref('rooms/main/deco').push({ t: decoSel, x: Math.round(lx), y: Math.round(ly) });
    return;
  }
  me.tx = Math.min(Math.max(lx, 10), W - 10);
  me.ty = Math.min(Math.max(ly, 30), H - 6);
  me.push && me.push();
});
cv.addEventListener('pointermove', e => {
  if (!drag) return;
  const { lx, ly } = evPos(e);
  if (drag.kind === 'deco') {
    const d = decos[drag.key];
    if (d) { d.x = Math.round(lx); d.y = Math.round(ly); drag.moved = true; }
  } else {
    layout[drag.id] = { x: Math.round(lx - drag.offx), y: Math.round(ly - drag.offy) };
  }
});
cv.addEventListener('pointerup', () => {
  if (!drag || !db) { drag = null; return; }
  if (drag.kind === 'deco') {
    const d = decos[drag.key];
    if (d && drag.moved) db.ref('rooms/main/deco/' + drag.key).set({ t: d.t, x: d.x, y: d.y });
  } else {
    const p = layout[drag.id];
    if (p) db.ref('rooms/main/layout/' + drag.id).set({ x: p.x, y: p.y });
    dragFurnId = null; rebuildObstacles(); buildRoom();
  }
  drag = null;
});
const keys = {};
const KEYMAP = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
  w: 'up', s: 'down', a: 'left', d: 'right', W: 'up', S: 'down', A: 'left', D: 'right',
  Shift: 'dash', b: 'dash', B: 'dash' };
let turnHold = 0;
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  const k = KEYMAP[e.key];
  if (!k) return;
  if (k !== 'dash' && me && !keys[k] && me.dir !== k) {
    me.dir = k; turnHold = performance.now() + 140;
    me.push && me.push();
  }
  keys[k] = true;
  if (k !== 'dash') e.preventDefault();
});
window.addEventListener('keyup', e => {
  const k = KEYMAP[e.key];
  if (k) { keys[k] = false; if (k !== 'dash' && me) { me.tx = me.x; me.ty = me.y; me.push && me.push(); } }
});
let lastKeyPush = 0;
function keyMove(dt, now) {
  if (!me) return false;
  let vx = 0, vy = 0;
  if (keys.up) vy -= 1; if (keys.down) vy += 1;
  if (keys.left) vx -= 1; if (keys.right) vx += 1;
  if (!vx && !vy) return false;
  if (performance.now() < turnHold) { me.moving = false; return true; }
  const dd = Math.hypot(vx, vy);
  const sp = SPEED * (keys.dash ? DASH : 1);
  const nx = Math.min(Math.max(me.x + vx / dd * sp * dt, 10), W - 10);
  const ny = Math.min(Math.max(me.y + vy / dd * sp * dt, 30), H - 6);
  tryMove(me, nx, ny);
  me.tx = me.x; me.ty = me.y;
  me.moving = true;
  me.dir = Math.abs(vx) > Math.abs(vy) ? (vx > 0 ? 'right' : 'left') : (vy > 0 ? 'down' : 'up');
  if (now - lastKeyPush > 180) { lastKeyPush = now; me.push && me.push(); }
  return true;
}

  if (!id) { id = 'p' + Math.random().toString(36).slice(2, 10); sessionStorage.setItem('metaid', id); }
  const sx = 336 + Math.random() * 40, sy = 418 + Math.random() * 8;
  me = { id, name, hs: av.hs, hc: av.hc, sc: av.sc, pc: av.pc, ac: av.ac,
    x: sx, y: sy, tx: sx, ty: sy, st: 'work', dir: 'down', em: '', emu: 0 };
  document.getElementById('stWork').classList.add('active');
  document.getElementById('stBreak').classList.remove('active');
  try { connect(); } catch (e) { document.getElementById('online').textContent = '⚠ 接続エラー: ' + e.message; }
}

// ================= チャットパネルの高さを部屋に合わせる（無限に伸びる問題の対策） =================
function sizeChat() {
  const st = document.getElementById('stage');
  const cp = document.getElementById('chatPanel');
  cp.style.height = (window.innerWidth > 760 ? st.clientHeight : 190) + 'px';
}
window.addEventListener('resize', sizeChat);
requestAnimationFrame(sizeChat);

// ================= メインループ =================
rebuildObstacles();
buildRoom();
let last = performance.now();
function step(p, dt) {
  const dx = p.tx - p.x, dy = p.ty - p.y, d = Math.hypot(dx, dy);
  p.moving = d > 1;
  if (p.moving) {
    const mv = Math.min(SPEED * dt, d);
    const moved = tryMove(p, p.x + dx / d * mv, p.y + dy / d * mv);
    if (moved) {
      p.dir = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up');
    } else {
      p.moving = false;
      if (me && p.id === me.id) { me.tx = me.x; me.ty = me.y; }
    }
  }
}
function loop(now) {
  const dt = Math.min((now - last) / 1000, .1); last = now;
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.drawImage(room, 0, 0);
  const frame = Math.floor(now / 150);
  const all = Object.values(others);
  if (me) {
    if (!keyMove(dt, now)) step(me, dt);
    all.push(me);
  }
  for (const o of Object.values(others)) step(o, dt);
  const drawList = [];
  for (const d of Object.values(decos)) drawList.push({ y: d.y, deco: d });
  for (const p of all) drawList.push({ y: p.y, p });
  drawList.sort((a, b) => a.y - b.y);
  ctx.save(); ctx.scale(S, S);
  g = ctx;
  // ドラッグ中の家具はカーソル追従で手前描画
  if (dragFurnId) {
    const f = FURN_DEFAULT.find(f2 => f2.id === dragFurnId);
    if (f) { const p = furnPos(f); FURN_TYPES[f.t].d(p.x, p.y, f.c); g = ctx; }
  }
  for (const item of drawList) {
    if (item.deco) { const fn = DECO_ITEMS[item.deco.t % DECO_ITEMS.length][1]; fn(item.deco.x, item.deco.y); g = ctx; }
    else {
      const p = item.p;
      const em = p.emu > Date.now() ? p.em : '';
      drawAvatar(ctx, p.x, p.y, p, p.moving, frame, p.dir, em);
    }
  }
  ctx.restore();
  for (const p of all) drawTag(p, frame);
  requestAnimationFrame(loop);
}
function drawTag(p, frame) {
  const nx = p.x * S, ny = (p.y - 35) * S;
  ctx.font = 'bold 17px sans-serif'; ctx.textAlign = 'center';
  const em = p.emu > Date.now() ? p.em : '';
  const icon = em === 'dance' ? '💃 ' : em === 'ssj' ? '⚡ ' : (p.st === 'break' ? '☕ ' : '💻 ');
  const tag = icon + p.name;
  const tw = ctx.measureText(tag).width + 14;
  const isMe = me && p.id === me.id;
  ctx.fillStyle = isMe ? 'rgba(232,180,90,.94)' : 'rgba(23,18,31,.78)';
  rr(nx - tw / 2, ny - 19, tw, 23, 6);
  ctx.fillStyle = isMe ? '#17121f' : '#fff';
  ctx.fillText(tag, nx, ny - 2);
  if (em === 'dance') {
    ctx.font = '20px sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText(frame % 2 ? '♪' : '♫', nx + (frame % 4 < 2 ? 40 : -40), ny - 26);
  }
  const b = bubbles[p.id];
  if (b && b.until > Date.now()) {
    ctx.font = '16px sans-serif';
    const lines = wrap(b.text, 20);
    const bw = Math.min(380, Math.max(...lines.map(l => ctx.measureText(l).width)) + 22);
    const bh = lines.length * 21 + 13;
    const bx = Math.min(Math.max(nx, bw / 2 + 4), W * S - bw / 2 - 4);
    const by = Math.max(ny - 26 - bh, 4);
    ctx.fillStyle = '#fff'; rr(bx - bw / 2, by, bw, bh, 8);
    ctx.beginPath(); ctx.moveTo(nx - 6, by + bh); ctx.lineTo(nx + 6, by + bh); ctx.lineTo(nx, by + bh + 8); ctx.fill();
    ctx.fillStyle = '#222';
    lines.forEach((l, i) => ctx.fillText(l, bx, by + 20 + i * 21));
  }
}
function rr(x, y, w, h, r) { ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.fill(); }
function wrap(t, n) { const out = []; for (let i = 0; i < t.length; i += n) out.push(t.slice(i, i + n)); return out.slice(0, 5); }
requestAnimationFrame(loop);
</script>
